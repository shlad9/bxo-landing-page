<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnScene Team Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #1a202c;
            text-align: center;
        }
        
        p {
            margin: 0 0 30px 0;
            color: #718096;
            font-size: 14px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .error-message {
            color: #f56565;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #cbd5e0;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🎬</div>
        <h2>UnScene Analytics</h2>
        <p>Team access only</p>
        
        <input 
            type="password" 
            id="password-input" 
            placeholder="Enter team password" 
            autofocus
        >
        
        <button onclick="checkPassword()">Access Dashboard</button>
        
        <div id="error-message" class="error-message">
            ❌ Incorrect password
        </div>
    </div>
    
    <script>
        // ⚠️ CHANGE THIS PASSWORD!
        const TEAM_PASSWORD = 'bxoadmin@1';
        
        function checkPassword() {
            const input = document.getElementById('password-input');
            const password = input.value.trim();
            
            if (password === TEAM_PASSWORD) {
                // Store authentication in session
                sessionStorage.setItem('team_auth', 'true');
                
                // Redirect to analytics dashboard
                window.location.href = '/team/analytics.html';
            } else {
                // Show error
                const errorMsg = document.getElementById('error-message');
                errorMsg.style.display = 'block';
                
                // Clear input and refocus
                input.value = '';
                input.focus();
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
